<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Стратегия vs Торговля</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { background:#061225; color:#e6eef8; font-family:Arial,sans-serif; margin:0; padding:16px; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
    .card { border:1px solid #1d3557; border-radius:10px; padding:12px; background:#0a1830; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:12px; }
    .muted { color:#9fb3c8; }
    #priceChartWrap { height:540px; }
    #equityChartWrap { height:220px; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { border-bottom:1px solid #1d3557; padding:8px; text-align:left; }
    th { color:#9fb3c8; }
    input, select, button {
      background:#0c1d39; color:#fff; border:1px solid #29476d; border-radius:8px; padding:8px 10px;
    }
    button { cursor:pointer; }
    h3 { margin-top:0; }
  </style>
</head>
<body>
  <div class="row">
    <button type="button" onclick="backToMainChart()">← Основной chart</button>

    <label>Symbol <input id="symbol" value="APTUSDT"></label>
    <label>TF <input id="tf" value="30"></label>
    <label>Strategy <input id="strategy" value="my_strategy3.py"></label>
    <label>Opt ID <input id="opt_id" value=""></label>
    <label>Last <input id="last" value="20"></label>
    <label>Limit <input id="limit" value="2000"></label>

    <button type="button" onclick="loadTradeChart()">Обновить</button>
  </div>

  <div class="grid">
    <div class="card"><div class="muted">Режим</div><div id="modeVal">-</div></div>
    <div class="card"><div class="muted">Сделок</div><div id="tradesTotal">-</div></div>
    <div class="card"><div class="muted">Винрейт</div><div id="winrate">-</div></div>
    <div class="card"><div class="muted">PnL USD</div><div id="pnlUsd">-</div></div>
  </div>

  <div class="card" style="margin-bottom:12px;">
    <div class="muted">Live status</div>
    <div id="liveStatus">-</div>
  </div>

  <div class="card" style="margin-bottom:12px;">
    <div id="priceChartWrap"></div>
  </div>

  <div class="card" style="margin-bottom:12px;">
    <div id="equityChartWrap"></div>
  </div>

  <div class="card">
    <div class="row" style="margin-bottom:10px;">
      <button type="button" id="tabStrategyBtn" onclick="showTradeTab('strategy')">Сделки стратегии</button>
      <button type="button" id="tabLiveBtn" onclick="showTradeTab('live')">Реальные сделки</button>
    </div>

    <div id="strategyTab">
      <h3>Сделки стратегии</h3>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Тип</th>
            <th>Сторона</th>
            <th>Причина</th>
            <th>Вход</th>
            <th>Выход</th>
            <th>Цена входа</th>
            <th>Цена выхода</th>
            <th>PnL</th>
            <th>Накопл. PnL</th>
          </tr>
        </thead>
        <tbody id="strategyTradesBody"></tbody>
      </table>
    </div>

    <div id="liveTab" style="display:none;">
      <h3>Реальные сделки</h3>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Время</th>
            <th>Тип</th>
            <th>Сторона</th>
            <th>Источник</th>
            <th>Цена</th>
            <th>Qty</th>
            <th>Note</th>
          </tr>
        </thead>
        <tbody id="liveTradesBody"></tbody>
      </table>
      <div id="liveTradesEmpty" class="muted" style="display:none; margin-top:10px;">
        Нет live-данных
      </div>
    </div>
  </div>

  <script>
    let tradeChartDataCache = null;

    function getParam(name, fallback='') {
      const u = new URL(window.location.href);
      return u.searchParams.get(name) || fallback;
    }

    function humanMode(mode) {
      if (mode === 'strategy_only') return 'Только стратегия';
      if (mode === 'compare') return 'Стратегия + Реал';
      return mode || '-';
    }

    function showTradeTab(tabName) {
      const strategyTab = document.getElementById('strategyTab');
      const liveTab = document.getElementById('liveTab');
      const strategyBtn = document.getElementById('tabStrategyBtn');
      const liveBtn = document.getElementById('tabLiveBtn');

      if (tabName === 'strategy') {
        strategyTab.style.display = '';
        liveTab.style.display = 'none';
        strategyBtn.style.background = '#16325c';
        liveBtn.style.background = '#0c1d39';
      } else {
        strategyTab.style.display = 'none';
        liveTab.style.display = '';
        strategyBtn.style.background = '#0c1d39';
        liveBtn.style.background = '#16325c';
      }
    }

    function backToMainChart() {
      const current = new URL(window.location.href);
      const target = new URL('/chart', window.location.origin);

      const keys = ['symbol', 'tf', 'strategy', 'opt_id', 'limit'];
      for (const key of keys) {
        const v = current.searchParams.get(key);
        if (v) target.searchParams.set(key, v);
      }

      const symbol = document.getElementById('symbol')?.value;
      const tf = document.getElementById('tf')?.value;
      const strategy = document.getElementById('strategy')?.value;
      const optId = document.getElementById('opt_id')?.value;
      const limit = document.getElementById('limit')?.value;
      const last = document.getElementById('last')?.value;

      if (symbol) target.searchParams.set('symbol', symbol);
      if (tf) target.searchParams.set('tf', tf);
      if (strategy) target.searchParams.set('strategy', strategy);
      if (optId) target.searchParams.set('opt_id', optId);
      if (limit) target.searchParams.set('limit', limit);
      if (last) target.searchParams.set('opt_last', last);

      window.location.href = target.toString();
    }

    function syncControlsFromUrl() {
      document.getElementById('symbol').value = getParam('symbol', 'APTUSDT');
      document.getElementById('tf').value = getParam('tf', '30');
      document.getElementById('strategy').value = getParam('strategy', 'my_strategy3.py');
      document.getElementById('opt_id').value = getParam('opt_id', '');
      document.getElementById('last').value = getParam('last', '20');
      document.getElementById('limit').value = getParam('limit', '2000');
    }

    async function loadTradeChart() {
      const symbol = document.getElementById('symbol').value;
      const tf = document.getElementById('tf').value;
      const strategy = document.getElementById('strategy').value;
      const optId = document.getElementById('opt_id').value;
      const last = document.getElementById('last').value;
      const limit = document.getElementById('limit').value;

      const url = new URL('/trade/chart/data', window.location.origin);
      url.searchParams.set('symbol', symbol);
      url.searchParams.set('tf', tf);
      url.searchParams.set('strategy', strategy);
      url.searchParams.set('last', last);
      url.searchParams.set('limit', limit);
      if (optId) url.searchParams.set('opt_id', optId);

      const res = await fetch(url.toString());
      const data = await res.json();

      const pageUrl = new URL(window.location.href);
      pageUrl.searchParams.set('symbol', symbol);
      pageUrl.searchParams.set('tf', tf);
      pageUrl.searchParams.set('strategy', strategy);
      pageUrl.searchParams.set('last', last);
      pageUrl.searchParams.set('limit', limit);
      if (optId) pageUrl.searchParams.set('opt_id', optId);
      window.history.replaceState({}, '', pageUrl.toString());

      renderSummary(data);
      renderPriceChart(data);
      renderEquityChart(data);
      renderStrategyTrades(data);
      renderLiveTrades(data);
    }

    function renderSummary(data) {
      document.getElementById('modeVal').textContent = humanMode(data?.context?.mode || '-');
      document.getElementById('tradesTotal').textContent = data?.strategy?.summary?.trades_total ?? '-';
      document.getElementById('winrate').textContent = data?.strategy?.summary?.winrate ?? '-';
      document.getElementById('pnlUsd').textContent = data?.strategy?.summary?.realized_pnl_usd ?? '-';

      const liveAvailable = data?.status?.live_available;
      document.getElementById('liveStatus').textContent = liveAvailable
        ? 'Live-торговля доступна'
        : 'Live-торговля недоступна';
    }

    function makeMarkerTrace(name, events, markerSymbol, textPosition='top center') {
      return {
        type: 'scatter',
        mode: 'markers+text',
        name,
        x: events.map(e => new Date(e.ts)),
        y: events.map(e => e.price),
        text: events.map(e => e.kind),
        textposition: textPosition,
        marker: { size: 11, symbol: markerSymbol },
        customdata: events.map(e => [e.source || '', e.side || '', e.qty || '', e.note || '']),
        hovertemplate:
          '<b>%{text}</b><br>' +
          'Time: %{x}<br>' +
          'Price: %{y}<br>' +
          'Source: %{customdata[0]}<br>' +
          'Side: %{customdata[1]}<br>' +
          'Qty: %{customdata[2]}<br>' +
          'Note: %{customdata[3]}<extra></extra>'
      };
    }


    function isFinalLiveEvent(e) {
      const note = String(e?.note || '').toLowerCase();
      const kind = String(e?.kind || '').toLowerCase();
      if (kind.startsWith('exchange_')) return true;
      if (!note) return true;
      return note.endsWith('_result') || note.includes('execute_result');
    }

    function renderPriceChart(data) {
      tradeChartDataCache = data;

      const bars = data?.chart?.bars || [];
      const strategyEvents = data?.strategy?.events || [];
      const liveEvents = (data?.live?.events || []).filter(isFinalLiveEvent);

      const candle = {
        type: 'candlestick',
        x: bars.map(b => new Date(b.ts)),
        open: bars.map(b => b.open),
        high: bars.map(b => b.high),
        low: bars.map(b => b.low),
        close: bars.map(b => b.close),
        name: 'OHLC'
      };

      const entryEvents = strategyEvents.filter(e => e.display_category === 'entry');
      const exitEvents = strategyEvents.filter(e => e.display_category === 'exit');

      const liveEntryEvents = liveEvents.filter(e => ['manual_long', 'manual_short', 'auto_long', 'auto_short'].includes(e.kind));
      const liveCloseEvents = liveEvents.filter(e => ['manual_close', 'auto_close'].includes(e.kind));
      const liveExternalEvents = liveEvents.filter(e => ['exchange_external_close', 'exchange_tp_sl_close'].includes(e.kind));

      const entriesTrace = {
        type: 'scatter',
        mode: 'markers',
        name: 'Strategy Entry',
        x: entryEvents.map(e => new Date(e.ts)),
        y: entryEvents.map(e => e.price),
        text: entryEvents.map(e => e.kind),
        marker: { size: 9, symbol: 'triangle-up' },
        hovertemplate: '<b>%{text}</b><br>Time: %{x}<br>Price: %{y}<extra></extra>'
      };

      const exitsTrace = {
        type: 'scatter',
        mode: 'markers',
        name: 'Strategy Exit',
        x: exitEvents.map(e => new Date(e.ts)),
        y: exitEvents.map(e => e.price),
        text: exitEvents.map(e => e.kind),
        marker: { size: 9, symbol: 'x' },
        hovertemplate: '<b>%{text}</b><br>Time: %{x}<br>Price: %{y}<extra></extra>'
      };

      const liveEntryTrace = makeMarkerTrace('Live Entry', liveEntryEvents, 'diamond', 'top center');
      const liveCloseTrace = makeMarkerTrace('Live Close', liveCloseEvents, 'square', 'bottom center');
      const liveExternalTrace = makeMarkerTrace('External / TP-SL Close', liveExternalEvents, 'star', 'bottom center');

      const traces = [
        candle,
        entriesTrace,
        exitsTrace,
        liveEntryTrace,
        liveCloseTrace,
        liveExternalTrace
      ];

      const layout = {
        paper_bgcolor: '#0a1830',
        plot_bgcolor: '#0a1830',
        font: { color: '#e6eef8' },
        xaxis: {
          rangeslider: { visible: false },
          showgrid: true,
          gridcolor: '#1d3557'
        },
        yaxis: {
          title: 'Price',
          showgrid: true,
          gridcolor: '#1d3557'
        },
        legend: { orientation: 'h' },
        margin: { t: 20, r: 20, b: 40, l: 50 }
      };

      Plotly.newPlot('priceChartWrap', traces, layout, { responsive: true });
    }

    function renderEquityChart(data) {
      const equity = data?.chart?.equity || [];

      const traces = [{
        type: 'scatter',
        mode: 'lines',
        name: 'Equity',
        x: equity.map(e => new Date(e.ts)),
        y: equity.map(e => e.value)
      }];

      const layout = {
        paper_bgcolor: '#0a1830',
        plot_bgcolor: '#0a1830',
        font: { color: '#e6eef8' },
        xaxis: {
          rangeslider: { visible: false },
          showgrid: true,
          gridcolor: '#1d3557'
        },
        yaxis: {
          title: 'Equity',
          showgrid: true,
          gridcolor: '#1d3557'
        },
        legend: { orientation: 'h' },
        margin: { t: 20, r: 20, b: 40, l: 50 }
      };

      Plotly.newPlot('equityChartWrap', traces, layout, { responsive: true });
    }

    function focusTradeOnChart(entryTs, exitTs) {
      const chartEl = document.getElementById('priceChartWrap');
      if (!chartEl) return;

      const startTs = entryTs || exitTs;
      const endTs = exitTs || entryTs;
      if (!startTs && !endTs) return;

      const padMs = 6 * 60 * 60 * 1000;
      const x0 = new Date((startTs || endTs) - padMs);
      const x1 = new Date((endTs || startTs) + padMs);

      Plotly.relayout(chartEl, {
        'xaxis.range[0]': x0,
        'xaxis.range[1]': x1
      });

      chartEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function renderStrategyTrades(data) {
      const tbody = document.getElementById('strategyTradesBody');
      tbody.innerHTML = '';

      const rows = data?.strategy?.trades || [];

      for (const r of rows) {
        const tr = document.createElement('tr');
        const tradeType = r.exit_ts ? 'ЗАКРЫТА' : 'ОТКРЫТА';

        tr.style.cursor = 'pointer';
        tr.onclick = () => focusTradeOnChart(r.entry_ts, r.exit_ts);

        tr.innerHTML = `
          <td>${r.trade_id ?? ''}</td>
          <td>${tradeType}</td>
          <td>${r.side ?? ''}</td>
          <td>${r.reason ?? ''}</td>
          <td>${fmtTs(r.entry_ts)}</td>
          <td>${fmtTs(r.exit_ts)}</td>
          <td>${fmtNum(r.entry_price)}</td>
          <td>${fmtNum(r.exit_price)}</td>
          <td>${fmtNum2(r.pnl_usd)}</td>
          <td>${fmtNum2(r.cum_pnl_usd)}</td>
        `;

        tr.onmouseenter = () => {
          tr.style.background = '#102446';
        };
        tr.onmouseleave = () => {
          tr.style.background = '';
        };

        tbody.appendChild(tr);
      }
    }

    function renderLiveTrades(data) {
      const tbody = document.getElementById('liveTradesBody');
      const empty = document.getElementById('liveTradesEmpty');
      tbody.innerHTML = '';

      const rows = [...(data?.live?.events || [])].filter(isFinalLiveEvent)
        .sort((a, b) => Number(b?.ts || 0) - Number(a?.ts || 0));

      if (!rows.length) {
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';

      rows.forEach((r, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>${fmtTs(r.ts)}</td>
          <td>${r.kind ?? ''}</td>
          <td>${r.side ?? ''}</td>
          <td>${r.source ?? ''}</td>
          <td>${fmtNum(r.price)}</td>
          <td>${fmtNum(r.qty)}</td>
          <td>${r.note ?? ''}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function fmtTs(v) {
      if (!v) return '';
      const d = new Date(v);
      const yyyy = d.getUTCFullYear();
      const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
      const dd = String(d.getUTCDate()).padStart(2, '0');
      const hh = String(d.getUTCHours()).padStart(2, '0');
      const mi = String(d.getUTCMinutes()).padStart(2, '0');
      const ss = String(d.getUTCSeconds()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
    }

    function fmtNum(v) {
      if (v === null || v === undefined || v === '') return '';
      return Number(v).toLocaleString(undefined, { maximumFractionDigits: 6 });
    }

    function fmtNum2(v) {
      if (v === null || v === undefined || v === '') return '';
      return Number(v).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    syncControlsFromUrl();
    showTradeTab('strategy');
    loadTradeChart();
  </script>
</body>
</html>
