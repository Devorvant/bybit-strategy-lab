<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade Chart</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #374151;
      --accent: #60a5fa;
      --good: #22c55e;
      --bad: #ef4444;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 16px; background: var(--bg); color: var(--text); font-family: Arial, sans-serif; }
    .container { max-width: 1600px; margin: 0 auto; display: grid; gap: 16px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--panel-2); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .card-body { padding: 12px 16px; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input, button {
      background: #0b1220; color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
    }
    button { cursor: pointer; background: #172554; border-color: #1d4ed8; }
    .meta { color: var(--muted); font-size: 13px; }
    #priceChart { width: 100%; height: 700px; }
    .tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--border); padding: 0 16px; background: var(--panel-2); flex-wrap: wrap; }
    .tab-btn { background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); padding: 12px 4px 10px; border-radius: 0; }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-panel { display: none; padding: 12px 16px 16px; }
    .tab-panel.active { display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid var(--border); padding: 8px 10px; text-align: left; white-space: nowrap; vertical-align: top; }
    th { position: sticky; top: 0; background: var(--panel); z-index: 1; }
    .table-wrap { overflow: auto; max-height: 520px; border: 1px solid var(--border); border-radius: 10px; }
    .empty { color: var(--muted); padding: 20px 8px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; border: 1px solid var(--border); }
    .long { color: #86efac; border-color: #166534; background: rgba(22,101,52,.18); }
    .short { color: #fca5a5; border-color: #991b1b; background: rgba(153,27,27,.18); }
    .manual { color: #93c5fd; border-color: #1d4ed8; background: rgba(29,78,216,.18); }
    .auto { color: #fcd34d; border-color: #b45309; background: rgba(180,83,9,.18); }
    .mixed, .external { color: #d8b4fe; border-color: #7e22ce; background: rgba(126,34,206,.18); }
    .pnl-pos { color: var(--good); }
    .pnl-neg { color: var(--bad); }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="toolbar">
          <label>Symbol <input id="symbolInput" value="APTUSDT"></label>
          <label>TF <input id="tfInput" value="30" style="width:80px"></label>
          <label>Strategy <input id="strategyInput" value="" placeholder="my_strategy.py"></label>
          <label>Limit <input id="limitInput" value="500" style="width:90px"></label>
          <button id="reloadBtn">Обновить</button>
        </div>
        <div class="meta" id="statusLine">—</div>
      </div>
      <div class="card-body">
        <div id="priceChart"></div>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" data-tab="strategyTradesTab">Сделки стратегии</button>
        <button class="tab-btn" data-tab="realTradesTab">Реальные сделки</button>
        <button class="tab-btn" data-tab="liveEventsTab">Live events</button>
      </div>

      <div id="strategyTradesTab" class="tab-panel active">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th><th>Тип</th><th>Вход</th><th>Выход</th><th>Цена входа</th><th>Цена выхода</th><th>Qty</th><th>PnL</th><th>Причина</th>
              </tr>
            </thead>
            <tbody id="strategyTradesBody"></tbody>
          </table>
        </div>
        <div class="empty" id="strategyTradesEmpty" style="display:none;">Нет данных по сделкам стратегии</div>
      </div>

      <div id="realTradesTab" class="tab-panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th><th>Тип</th><th>Источник</th><th>Вход</th><th>Выход</th><th>Цена входа</th><th>Цена выхода</th><th>Qty</th><th>PnL</th><th>Закрытие</th><th>Entry code</th><th>Exit code</th>
              </tr>
            </thead>
            <tbody id="realTradesBody"></tbody>
          </table>
        </div>
        <div class="empty" id="realTradesEmpty" style="display:none;">Нет данных по реальным сделкам</div>
      </div>

      <div id="liveEventsTab" class="tab-panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th><th>Время</th><th>Событие</th><th>Side</th><th>Source</th><th>Цена</th><th>Qty</th><th>Order Link</th><th>Note</th>
              </tr>
            </thead>
            <tbody id="liveTradesBody"></tbody>
          </table>
        </div>
        <div class="empty" id="liveTradesEmpty" style="display:none;">Нет live-данных</div>
      </div>
    </div>
  </div>

  <script>
    function q(id) { return document.getElementById(id); }

    function getParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        symbol: params.get('symbol') || q('symbolInput').value || 'APTUSDT',
        tf: params.get('tf') || q('tfInput').value || '30',
        strategy: params.get('strategy') || q('strategyInput').value || '',
        limit: params.get('limit') || q('limitInput').value || '500',
      };
    }

    function updateInputsFromParams() {
      const p = getParams();
      q('symbolInput').value = p.symbol;
      q('tfInput').value = p.tf;
      q('strategyInput').value = p.strategy;
      q('limitInput').value = p.limit;
    }

    function formatTs(ts) {
      if (ts == null || ts === '') return '';
      const n = Number(ts);
      const d = Number.isFinite(n) ? new Date(n) : new Date(ts);
      if (Number.isNaN(d.getTime())) return String(ts);
      return d.toLocaleString('ru-RU', { hour12: false });
    }

    function formatPrice(v) {
      if (v == null || v === '') return '';
      const n = Number(v);
      if (!Number.isFinite(n)) return String(v);
      return n.toFixed(6).replace(/0+$/,'').replace(/\.$/,'');
    }

    function formatQty(v) {
      if (v == null || v === '') return '';
      const n = Number(v);
      if (!Number.isFinite(n)) return String(v);
      return n.toFixed(4).replace(/0+$/,'').replace(/\.$/,'');
    }

    function formatPnl(v) {
      if (v == null || v === '') return '';
      const n = Number(v);
      if (!Number.isFinite(n)) return String(v);
      return n.toFixed(4).replace(/0+$/,'').replace(/\.$/,'');
    }

    function sidePill(side) {
      const s = String(side || '').toUpperCase();
      if (!s) return '';
      const cls = s.includes('SHORT') ? 'short' : 'long';
      return '<span class="pill ' + cls + '">' + s + '</span>';
    }

    function sourcePill(source) {
      const s = String(source || '').toLowerCase();
      if (!s) return '';
      const cls = ['manual','auto','mixed','external'].includes(s) ? s : 'mixed';
      return '<span class="pill ' + cls + '">' + s + '</span>';
    }

    function renderStrategyTrades(data) {
      const rows = data?.strategy?.trades || data?.strategy_trades?.rows || [];
      const tbody = q('strategyTradesBody');
      const empty = q('strategyTradesEmpty');
      tbody.innerHTML = '';
      if (!rows.length) { empty.style.display = ''; return; }
      empty.style.display = 'none';

      rows.forEach((r, idx) => {
        const pnl = r.pnl_usd ?? r.pnl ?? '';
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + (idx + 1) + '</td>' +
          '<td>' + sidePill(r.side || r.direction || '') + '</td>' +
          '<td>' + formatTs(r.entry_ts || r.entry_time) + '</td>' +
          '<td>' + formatTs(r.exit_ts || r.exit_time) + '</td>' +
          '<td>' + formatPrice(r.entry_price) + '</td>' +
          '<td>' + formatPrice(r.exit_price) + '</td>' +
          '<td>' + formatQty(r.qty || r.size) + '</td>' +
          '<td class="' + (Number(pnl) > 0 ? 'pnl-pos' : Number(pnl) < 0 ? 'pnl-neg' : '') + '">' + formatPnl(pnl) + '</td>' +
          '<td>' + (r.close_reason || r.exit_reason || '') + '</td>';
        tbody.appendChild(tr);
      });
    }

    function renderRealTrades(data) {
      const rows = [...(data?.real_trades?.rows || [])]
        .sort((a, b) => Number(b.exit_ts || b.entry_ts || 0) - Number(a.exit_ts || a.entry_ts || 0));

      const tbody = q('realTradesBody');
      const empty = q('realTradesEmpty');
      tbody.innerHTML = '';
      if (!rows.length) { empty.style.display = ''; return; }
      empty.style.display = 'none';

      rows.forEach((r, idx) => {
        const pnl = r.pnl_usd ?? r.pnl ?? '';
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + (idx + 1) + '</td>' +
          '<td>' + sidePill(r.side || '') + '</td>' +
          '<td>' + sourcePill(r.source || '') + '</td>' +
          '<td>' + formatTs(r.entry_ts) + '</td>' +
          '<td>' + formatTs(r.exit_ts) + '</td>' +
          '<td>' + formatPrice(r.entry_price) + '</td>' +
          '<td>' + formatPrice(r.exit_price) + '</td>' +
          '<td>' + formatQty(r.qty) + '</td>' +
          '<td class="' + (Number(pnl) > 0 ? 'pnl-pos' : Number(pnl) < 0 ? 'pnl-neg' : '') + '">' + formatPnl(pnl) + '</td>' +
          '<td>' + (r.close_reason || '') + '</td>' +
          '<td class="muted">' + (r.entry_code || r.entry_order_link_id || '') + '</td>' +
          '<td class="muted">' + (r.exit_code || r.exit_order_link_id || '') + '</td>';
        tbody.appendChild(tr);
      });
    }

    function renderLiveTrades(data) {
      const events = [...(data?.live?.events || [])]
        .filter(e => {
          const kind = String(e.kind || '').toLowerCase();
          return !kind.endsWith('_requested');
        })
        .sort((a, b) => Number(b.ts || 0) - Number(a.ts || 0));

      const tbody = q('liveTradesBody');
      const empty = q('liveTradesEmpty');
      tbody.innerHTML = '';
      if (!events.length) { empty.style.display = ''; return; }
      empty.style.display = 'none';

      events.forEach((e, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + (idx + 1) + '</td>' +
          '<td>' + formatTs(e.ts) + '</td>' +
          '<td>' + (e.kind || '') + '</td>' +
          '<td>' + (e.side || '') + '</td>' +
          '<td>' + (e.source || '') + '</td>' +
          '<td>' + formatPrice(e.price) + '</td>' +
          '<td>' + formatQty(e.qty) + '</td>' +
          '<td class="muted">' + (e.order_link_id || e.orderLinkId || e.trade_id || '') + '</td>' +
          '<td>' + (e.note || '') + '</td>';
        tbody.appendChild(tr);
      });
    }

    function buildMarkerTrace(name, events, symbol, textPosition) {
      if (!events.length) return null;
      return {
        type: 'scatter',
        mode: 'markers+text',
        name,
        x: events.map(e => new Date(Number(e.ts))),
        y: events.map(e => Number(e.price)),
        text: events.map(e => e.kind || ''),
        textposition: textPosition || 'top center',
        marker: { size: 11, symbol: symbol },
        hovertemplate: '<b>%{text}</b><br>Time: %{x}<br>Price: %{y}<extra></extra>'
      };
    }

    function renderPriceChart(data) {
      const bars = data?.bars || data?.price?.bars || [];
      const strategyEvents = data?.strategy?.events || [];
      const liveEvents = (data?.live?.events || []).filter(e => !String(e.kind || '').toLowerCase().endsWith('_requested'));

      if (!bars.length) {
        Plotly.newPlot('priceChart', [], { paper_bgcolor: '#111827', plot_bgcolor: '#111827', font: { color: '#e5e7eb' } });
        return;
      }

      const candle = {
        type: 'candlestick',
        name: 'Price',
        x: bars.map(b => new Date(Number(b.ts || b.time))),
        open: bars.map(b => Number(b.open)),
        high: bars.map(b => Number(b.high)),
        low: bars.map(b => Number(b.low)),
        close: bars.map(b => Number(b.close))
      };

      const strategyEntryEvents = strategyEvents.filter(e => /entry|open/i.test(String(e.kind || e.type || '')));
      const strategyExitEvents = strategyEvents.filter(e => /exit|close/i.test(String(e.kind || e.type || '')));
      const liveEntryEvents = liveEvents.filter(e => ['manual_long','manual_short','auto_long','auto_short'].includes(e.kind));
      const liveCloseEvents = liveEvents.filter(e => ['manual_close','auto_close'].includes(e.kind));
      const liveExternalEvents = liveEvents.filter(e => ['exchange_external_close','exchange_tp_sl_close'].includes(e.kind));

      const traces = [candle];
      [ 
        buildMarkerTrace('Strategy Entry', strategyEntryEvents, 'triangle-up', 'top center'),
        buildMarkerTrace('Strategy Exit', strategyExitEvents, 'triangle-down', 'bottom center'),
        buildMarkerTrace('Live Entry', liveEntryEvents, 'diamond', 'top left'),
        buildMarkerTrace('Live Close', liveCloseEvents, 'x', 'bottom left'),
        buildMarkerTrace('External / TP-SL Close', liveExternalEvents, 'star', 'bottom right')
      ].forEach(t => { if (t) traces.push(t); });

      Plotly.newPlot('priceChart', traces, {
        paper_bgcolor: '#111827',
        plot_bgcolor: '#111827',
        font: { color: '#e5e7eb' },
        xaxis: { rangeslider: { visible: false } },
        legend: { orientation: 'h' },
        margin: { l: 50, r: 20, t: 20, b: 40 }
      }, { responsive: true });
    }

    function renderStatus(data, params) {
      const liveCount = data?.live?.events?.length || 0;
      const realCount = data?.real_trades?.rows?.length || 0;
      const strategyCount = (data?.strategy?.trades || []).length;
      q('statusLine').textContent =
        params.symbol + ' · TF ' + params.tf +
        ' · strategy: ' + (params.strategy || '—') +
        ' · strategy trades: ' + strategyCount +
        ' · real trades: ' + realCount +
        ' · live events: ' + liveCount;
    }

    async function loadData() {
      const params = getParams();
      const qs = new URLSearchParams();
      qs.set('symbol', params.symbol);
      qs.set('tf', params.tf);
      if (params.strategy) qs.set('strategy', params.strategy);
      if (params.limit) qs.set('limit', params.limit);

      const res = await fetch('/trade/chart/data?' + qs.toString());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      renderStatus(data, params);
      renderPriceChart(data);
      renderStrategyTrades(data);
      renderRealTrades(data);
      renderLiveTrades(data);
    }

    function bindTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tabId = btn.dataset.tab;
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          q(tabId).classList.add('active');
        });
      });
    }

    q('reloadBtn').addEventListener('click', loadData);
    updateInputsFromParams();
    bindTabs();
    loadData().catch(err => {
      q('statusLine').textContent = 'Ошибка загрузки: ' + err.message;
      console.error(err);
    });
  </script>
</body>
</html>
